name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.22.x', '1.23.x']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Verify gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt diff:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./core/... ./mobjects/... ./internal/...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Must be ≥ the `go` directive in go.mod (1.26.2). The
          # setup-go action will auto-download a matching toolchain
          # via GOTOOLCHAIN when this is older than go.mod requires.
          go-version: '1.26.x'
          cache: true
      - name: golangci-lint
        # golangci-lint-action v7+ is required for golangci-lint v2.
        # The pinned linter version is built with Go 1.26 (matches
        # the go.mod go directive — see lint binary error message
        # if you bump go.mod past the linter's build Go version).
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
